<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHALED ALI STORE | المنتجات</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght=300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-popup { animation: fadeIn 0.25s ease-out forwards; }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 min-h-screen flex flex-col">

    <!-- الهيدر -->
    <header class="bg-white shadow-sm sticky top-0 z-40">
        <div class="container mx-auto px-6 py-3 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3 group">
                <div class="h-9 w-9 rounded-full bg-[#2A4B37] text-white flex items-center justify-center font-bold text-xs group-hover:bg-[#1E3527] transition">←</div>
                <span class="text-lg font-bold text-[#2A4B37]">الرئيسية</span>
            </a>
            <h1 class="text-xl font-bold text-stone-900">صالة المنتجات الكاملة 🛍️</h1>
            <button onclick="toggleCartDrawer()" class="relative p-2.5 bg-stone-100 text-stone-700 rounded-full hover:bg-stone-200 transition cursor-pointer">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
                </svg>
                <span id="cart-count-header" class="absolute -top-1 -right-1 bg-amber-600 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold hidden">0</span>
            </button>
        </div>
    </header>

    <!-- قائمة المنتجات الكاملة -->
    <main class="container mx-auto px-6 py-12 flex-1">
        <div id="loading-status" class="text-center py-12 text-stone-500 text-lg">⏳ جاري جلب كافة المنتجات الفاخرة...</div>
        <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8 hidden">
            <!-- كل المنتجات تظهر هنا -->
        </div>
    </main>

    <!-- مودال التفاصيل المطور -->
    <div id="product-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-3xl max-w-4xl w-full max-h-[90vh] overflow-y-auto shadow-2xl relative flex flex-col md:flex-row overflow-hidden animate-popup">
            <button onclick="closeModal()" class="absolute top-4 left-4 bg-white/80 hover:bg-stone-200 text-stone-700 h-10 w-10 rounded-full flex items-center justify-center z-10 font-bold shadow">✕</button>
            <div class="w-full md:w-3/5 h-72 md:h-auto bg-stone-100 flex items-center justify-center relative overflow-hidden" id="modal-media-container"></div>
            <div class="w-full md:w-2/5 p-8 flex flex-col justify-between space-y-6 bg-white">
                <div class="space-y-4">
                    <h3 id="modal-product-name" class="text-2xl font-bold text-stone-900">اسم المنتج</h3>
                    <p id="modal-product-desc" class="text-stone-600 text-sm leading-relaxed whitespace-pre-line">الوصف.</p>
                </div>
                <div class="border-t border-stone-100 pt-6 flex flex-col space-y-4">
                    <span id="modal-product-price" class="text-2xl font-bold text-[#2A4B37]">0 EGP</span>
                    <button id="modal-add-to-cart-btn" class="w-full bg-[#2A4B37] text-white py-3.5 rounded-xl font-bold hover:bg-[#1E3527] transition flex items-center justify-center gap-2 cursor-pointer">إضافة إلى السلة 🛒</button>
                </div>
            </div>
        </div>
    </div>

    <!-- السلة الجانبية الشخصية للمستخدم المحفوظة بالـ LocalStorage -->
    <div id="cart-drawer" class="fixed inset-0 z-50 hidden">
        <div onclick="toggleCartDrawer()" class="absolute inset-0 bg-black/50 backdrop-blur-xs"></div>
        <div class="absolute inset-y-0 right-0 max-w-md w-full bg-white shadow-2xl flex flex-col justify-between">
            <div class="p-6 border-b border-stone-100 flex justify-between items-center bg-stone-50">
                <div class="flex items-center gap-2">
                    <span class="text-xl">🛒</span>
                    <h3 class="text-lg font-bold text-stone-900">سلة مشترياتك</h3>
                    <span id="cart-count-badge" class="bg-[#2A4B37] text-white text-xs px-2 py-0.5 rounded-full font-bold">0</span>
                </div>
                <button onclick="toggleCartDrawer()" class="text-stone-400 hover:text-stone-600 font-bold text-xl cursor-pointer">✕</button>
            </div>

            <div id="cart-items-container" class="p-6 overflow-y-auto flex-1 space-y-4"></div>

            <div class="p-6 border-t border-stone-100 bg-stone-50 space-y-4">
                <div class="flex justify-between items-center text-stone-900 font-bold text-lg">
                    <span>إجمالي الحساب:</span>
                    <span id="cart-total-price" class="text-[#2A4B37]">0 EGP</span>
                </div>
                <button onclick="checkoutCartViaWhatsApp()" class="w-full bg-[#2A4B37] hover:bg-[#1E3527] text-white py-4 rounded-xl font-bold transition flex items-center justify-center gap-2 cursor-pointer">
                    إرسال الطلب المجمع عبر واتساب ⚡
                </button>
            </div>
        </div>
    </div>

    <!-- زر السلة العائم -->
    <button onclick="toggleCartDrawer()" id="floating-cart-btn" class="fixed bottom-6 right-6 z-40 bg-amber-600 hover:bg-amber-700 text-white p-4 rounded-full shadow-2xl flex items-center justify-center transition hidden cursor-pointer">
        <svg class="w-7 h-7" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
        <span id="cart-count-floating" class="absolute -top-1 -left-1 bg-red-600 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
    </button>

    <footer class="bg-stone-900 text-stone-400 py-6 text-center text-xs">
        <p>© 2026 KHALED ALI STORE. جميع الحقوق محفوظة.</p>
    </footer>

    <script>
        const googleSheetCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSxdTJvpCwEax5QOTSuzwuRxY_bJGLVJpso3A5SitG72v998xuDD7XNBORA4RFJcKCarLWE8dQR_0iV/pub?output=csv";
        let globalProducts = [];
        let cart = JSON.parse(localStorage.getItem('khaled_store_cart')) || []; // متصل بنفس المخزن الذكي

        async function fetchAllProducts() {
            const loadingText = document.getElementById('loading-status');
            const grid = document.getElementById('products-grid');
            try {
                const response = await fetch(googleSheetCsvUrl);
                const csvText = await response.text();
                const rows = csvText.split(/\r?\n/).map(row => row.trim()).filter(row => row);
                globalProducts = [];

                for (let i = 1; i < rows.length; i++) {
                    const columns = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (columns.length >= 2) {
                        globalProducts.push({
                            id: i - 1,
                            name: columns[0] ? columns[0].replace(/^"|"$/g, '').trim() : 'منتج جديد',
                            price: columns[1] ? columns[1].replace(/^"|"$/g, '').trim() : 'حسب الطلب',
                            desc: columns[2] ? columns[2].replace(/^"|"$/g, '').trim() : 'لا يوجد وصف متاح.',
                            img: columns[3] ? columns[3].replace(/^"|"$/g, '').trim() : '',
                            icon: columns[4] ? columns[4].replace(/^"|"$/g, '').trim() : '📦'
                        });
                    }
                }
                loadingText.classList.add('hidden');
                renderProducts(globalProducts);
                grid.classList.remove('hidden');
                updateCartUI();
            } catch (e) {
                loadingText.innerText = "❌ فشل تحميل المنتجات.";
            }
        }

        function renderProducts(items) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            items.forEach(product => {
                let mediaHTML = `<div class="h-56 bg-stone-100 flex items-center justify-center text-5xl transition-transform duration-500 ease-in-out transform group-hover:scale-110">${product.icon}</div>`;
                if (product.img && product.img.startsWith('http')) {
                    mediaHTML = `<div class="h-56 overflow-hidden bg-stone-50"><img src="${product.img}" class="w-full h-full object-cover transition-transform duration-500 ease-in-out transform group-hover:scale-110" onerror="this.parentElement.innerHTML='📦'" alt="${product.name}"></div>`;
                }
                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl border border-stone-200 overflow-hidden hover:shadow-2xl transition-all duration-300 cursor-pointer group flex flex-col justify-between";
                card.setAttribute('onclick', `openModal(${product.id})`);
                card.innerHTML = `
                    <div>
                        ${mediaHTML}
                        <div class="p-5">
                            <h3 class="text-base font-bold text-stone-900 mb-1.5 group-hover:text-[#2A4B37] transition line-clamp-1">${product.name}</h3>
                            <p class="text-xs text-stone-500 line-clamp-2 h-8">${product.desc}</p>
                        </div>
                    </div>
                    <div class="p-5 border-t border-stone-50 flex justify-between items-center bg-stone-50/50">
                        <span class="text-base font-bold text-[#2A4B37]">${product.price}</span>
                        <button onclick="event.stopPropagation(); addToCart(${product.id});" class="bg-[#2A4B37] text-white px-4 py-2 rounded-xl text-xs font-semibold hover:bg-[#1E3527] cursor-pointer">إضافة للسلة 🛒</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function openModal(id) {
            const product = globalProducts.find(p => p.id === id);
            if (!product) return;
            document.getElementById('modal-product-name').innerText = product.name;
            document.getElementById('modal-product-desc').innerText = product.desc;
            document.getElementById('modal-product-price').innerText = product.price;
            const container = document.getElementById('modal-media-container');
            container.innerHTML = product.img ? `<img src="${product.img}" class="w-full h-full object-contain md:object-cover p-2 md:p-0">` : `<span class="text-6xl">${product.icon}</span>`;
            document.getElementById('modal-add-to-cart-btn').setAttribute('onclick', `addToCart(${product.id}); closeModal();`);
            document.getElementById('product-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('product-modal').classList.add('hidden'); }
        function toggleCartDrawer() { document.getElementById('cart-drawer').classList.toggle('hidden'); }

        function addToCart(id) {
            const product = globalProducts.find(p => p.id === id);
            if (!product) return;
            const existing = cart.find(item => item.id === id);
            if (existing) { existing.quantity += 1; } else { cart.push({ ...product, quantity: 1 }); }
            localStorage.setItem('khaled_store_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function changeQuantity(id, delta) {
            const item = cart.find(item => item.id === id);
            if (!item) return;
            item.quantity += delta;
            if (item.quantity <= 0) cart = cart.filter(item => item.id !== id);
            localStorage.setItem('khaled_store_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items-container');
            const totalCount = cart.reduce((sum, item) => sum + item.quantity, 0);
            
            document.getElementById('cart-count-badge').innerText = totalCount;
            const hCount = document.getElementById('cart-count-header');
            hCount.innerText = totalCount;
            if(totalCount > 0) hCount.classList.remove('hidden'); else hCount.classList.add('hidden');
            
            const fCart = document.getElementById('floating-cart-btn');
            document.getElementById('cart-count-floating').innerText = totalCount;
            if(totalCount > 0) fCart.classList.remove('hidden'); else fCart.classList.add('hidden');

            if (cart.length === 0) {
                container.innerHTML = `<div class="text-center py-12 text-stone-400 text-sm">السلة فارغة حالياً.</div>`;
                document.getElementById('cart-total-price').innerText = '0 EGP';
                return;
            }

            container.innerHTML = '';
            let totalMoney = 0;
            cart.forEach(item => {
                const priceNum = parseFloat(item.price.replace(/[^0-9.]/g, '')) || 0;
                const totalItemPrice = priceNum * item.quantity;
                totalMoney += totalItemPrice;

                const row = document.createElement('div');
                row.className = "flex items-center gap-3 bg-stone-50 p-3 rounded-xl border border-stone-100 animate-popup";
                row.innerHTML = `
                    <div class="w-14 h-14 rounded-lg bg-white overflow-hidden border border-stone-200 shrink-0 flex items-center justify-center text-xl">
                        ${item.img ? `<img src="${item.img}" class="w-full h-full object-cover">` : item.icon}
                    </div>
                    <div class="flex-1 min-w-0">
                        <h4 class="text-sm font-bold text-stone-900 truncate">${item.name}</h4>
                        <p class="text-xs text-stone-700 font-semibold mt-1">المجموع: ${totalItemPrice} EGP</p>
                    </div>
                    <div class="flex items-center gap-1.5 bg-white border border-stone-200 rounded-lg p-1">
                        <button onclick="changeQuantity(${item.id}, 1)" class="w-5 h-5 bg-stone-50 text-xs rounded hover:bg-stone-200 font-bold">+</button>
                        <span class="text-xs font-bold w-4 text-center">${item.quantity}</span>
                        <button onclick="changeQuantity(${item.id}, -1)" class="w-5 h-5 bg-stone-50 text-xs rounded hover:bg-stone-200 font-bold">-</button>
                    </div>
                `;
                container.appendChild(row);
            });
            document.getElementById('cart-total-price').innerText = `${totalMoney} EGP`;
        }

        function checkoutCartViaWhatsApp() {
            if (cart.length === 0) return;
            let msg = `أهلاً KHALED ALI STORE، طلب شراء جديد:\n=========================\n`;
            cart.forEach((item, i) => { msg += `${i + 1}) ${item.name} (العدد: ${item.quantity}) - السعر: ${item.price}\n`; });
            msg += `=========================\n💰 الإجمالي: ${document.getElementById('cart-total-price').innerText}\n\nتأكيد الطلب ✨`;
            window.open(`https://wa.me/201090140339?text=${encodeURIComponent(msg)}`, '_blank');
        }

        document.getElementById('product-modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
        fetchAllProducts();
    </script>
</body>
</html>
